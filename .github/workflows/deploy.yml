name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Set this as a repository Variable (Settings -> Secrets and variables
          # -> Actions -> Variables) to the deployed Ollama proxy worker URL,
          # e.g. https://ollama-proxy.<account>.workers.dev. When empty, the app
          # calls ollama.com directly (blocked by browser CORS on the live site).
          VITE_OLLAMA_PROXY_URL: ${{ vars.VITE_OLLAMA_PROXY_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: notebook.tangent.to
